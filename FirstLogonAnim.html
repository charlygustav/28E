<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>28E</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #09090b;
    font-family: 'Inter', sans-serif;
  }

  /* ── BLOBS ORIGINAL ──────────────────────────────── */
  .circles { position: fixed; inset: 0; pointer-events: none; }
  @keyframes c1 {
    0%   { transform:translate(0,0);       width:30vw;  height:30vw; }
    100% { transform:translate(30vw,-35vh);width:80vw;  height:80vw; }
  }
  @keyframes c2 {
    0%   { transform:translate(0,0);        width:20vw;  height:20vw; }
    100% { transform:translate(-45vw,-40vh);width:80vw;  height:80vw; }
  }
  @keyframes c3 {
    0%   { transform:translate(0,0);        width:20vw;  height:20vw; }
    100% { transform:translate(-55vw,-80vh);width:120vw; height:120vw; }
  }
  @keyframes blobIn { from{opacity:0}to{opacity:1} }
  .circle1 {
    position:absolute; left:30vw; top:25vh; border-radius:50%;
    animation: c1 12s infinite alternate, blobIn 1.4s ease-out;
    background: radial-gradient(50% 50% at 50% 50%, rgba(236,72,153,.28) 15%, transparent 100%);
  }
  .circle2 {
    position:absolute; left:45vw; top:30vh; border-radius:50%;
    animation: c2 11.5s infinite alternate, blobIn 1.4s ease-out;
    background: radial-gradient(50% 50% at 50% 50%, rgba(245,158,11,.22) 15%, transparent 100%);
  }
  .circle3 {
    position:absolute; left:35vw; top:30vh; border-radius:50%;
    animation: c3 15s infinite alternate, blobIn 1.4s ease-out;
    background: radial-gradient(50% 50% at 50% 50%, rgba(219,39,119,.4) 15%, transparent 100%);
  }

  /* ── LOADER PANEL ────────────────────────────────── */
  /* Covers everything, then slides up on exit */
  .loader {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: #09090b;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: slideUp 1s cubic-bezier(0.76, 0, 0.24, 1) 2.8s forwards;
  }
  @keyframes slideUp {
    to { transform: translateY(-100%); }
  }

  /* Blobs also inside loader so they're visible during load */
  .loader .circles { position: absolute; }

  /* ── LOGO ────────────────────────────────────────── */
  /* Overflow-hidden container clips the text reveal */
  .clip {
    overflow: hidden;
    /* Tiny bit of padding so descenders don't clip */
    padding-bottom: 0.05em;
  }

  .logo {
    display: block;
    font-size: clamp(72px, 20vw, 200px);
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.04em;
    line-height: 1;
    /* Starts below the clip, slides up into view */
    transform: translateY(110%);
    animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
  }

  @keyframes revealUp {
    to { transform: translateY(0); }
  }

  /* ── SMALL LABEL BOTTOM-LEFT ─────────────────────── */
  .label {
    position: absolute;
    bottom: 32px;
    left: clamp(20px, 5vw, 40px);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(255,255,255,.28);
    opacity: 0;
    animation: fadeLabel .5s ease-out 1s forwards;
  }
  @keyframes fadeLabel { to { opacity: 1; } }

  /* ── SMALL YEAR BOTTOM-RIGHT ─────────────────────── */
  .year {
    position: absolute;
    bottom: 32px;
    right: clamp(20px, 5vw, 40px);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .12em;
    color: rgba(255,255,255,.28);
    opacity: 0;
    animation: fadeLabel .5s ease-out 1.1s forwards;
  }

  /* ── THIN LINE (top of screen, fills left→right) ── */
  .line {
    position: absolute;
    top: 0; left: 0;
    height: 1.5px;
    background: linear-gradient(90deg, rgba(245,158,11,.9), rgba(236,72,153,.6));
    width: 0;
    animation: growLine 2.4s cubic-bezier(.4,0,.2,1) .1s forwards;
  }
  @keyframes growLine { to { width: 100%; } }
</style>
</head>
<body>

  <!-- Background always visible -->
  <div class="circles">
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="circle3"></div>
  </div>

  <!-- Loader (solid panel that slides away) -->
  <div class="loader">

    <!-- Blobs inside loader too -->
    <div class="circles">
      <div class="circle1"></div>
      <div class="circle2"></div>
      <div class="circle3"></div>
    </div>

    <!-- Top progress line -->
    <div class="line"></div>

    <!-- Main logotype, clip-revealed upward -->
    <div class="clip">
      <span class="logo">28E</span>
    </div>

    <!-- Corner details -->
    <span class="label">28E ©</span>
    <span class="year" id="yr"></span>

  </div>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>

</body>
</html>
